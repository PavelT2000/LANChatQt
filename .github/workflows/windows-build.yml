name: Windows Build (Qt)

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Build project
        shell: cmd
        run: |
          :: 1. Удаляем старые папки, если они есть
          if exist debug rmdir /s /q debug
          if exist release rmdir /s /q release
          
          :: 2. Генерируем Makefile с явным указанием Release
          qmake LANChatQt.pro CONFIG+=release
          
          :: 3. Собираем именно release-цель (важно для создания папки release)
          mingw32-make release -j2

      - name: Deploy Qt Dependencies
        shell: pwsh
        run: |
          # Даем системе секунду "продышаться" после сборки
          Start-Sleep -s 1
          
          # Проверяем наличие файла в папке release
          if (Test-Path "release\LANChatQt.exe") {
              Write-Host "Файл найден, начинаю деплой..."
              cd release
              windeployqt --no-translations --compiler-runtime LANChatQt.exe
          } else {
              Write-Error "LANChatQt.exe не найден в папке release. Проверьте логи шага Build."
              exit 1
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LANChatQt-Windows-Standalone
          path: release/
          if-no-files-found: error