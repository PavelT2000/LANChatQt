name: Windows Build (Qt)

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          # Убедитесь, что версия совпадает с той, что вы используете локально
          version: '6.5.0' 
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw' # 'win64_mingw' для Qt6, 'win64_mingw81' для Qt5

      - name: Build project
        run: |
          qmake LANChatQt.pro
          mingw32-make -j2

      - name: Deploy Qt dependencies
        run: |
          # Ищем, где на самом деле лежит exe (в корне или в release)
          $exePath = (Get-ChildItem -Recurse -Filter LANChatQt.exe | Select-Object -First 1).FullName
          if (-not $exePath) { throw "LANChatQt.exe не найден!" }
          
          $exeDir = Split-Path -Parent $exePath
          cd $exeDir
          
          # Запускаем утилиту развертывания
          windeployqt --no-translations --compiler-runtime LANChatQt.exe
        shell: pwsh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          # Загружаем всю папку, где лежит exe и все нужные dll
          path: |
            **/release/*.exe
            **/release/*.dll
            *.exe
            *.dll
